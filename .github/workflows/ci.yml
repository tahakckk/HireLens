name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-cpu.txt -r requirements-dev.txt
      - run: python -m pip check
      - run: python -c "import torch; assert torch.version.cuda is None"
      - run: python -m ruff check . --select F,E9
      - run: python -m pytest -q
